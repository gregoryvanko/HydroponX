services:
  node-red:
    image: nodered/node-red:latest
    container_name: noderedhydroponx
    user: "0"
    privileged: true
    restart: unless-stopped
    networks:
      - hydro
    ports:
      - "1881:1880"
    environment:
      - TZ=Europe/Brussels
      - INFLUX_TOKEN=${INFLUX_TOKEN:?error}
      - INFLUX_URL=${INFLUX_URL:?error}
      - INFLUX_ORGA=${INFLUX_ORGA:?error}
      - INFLUX_BUCKET=${INFLUX_BUCKET:?error}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:?error}
      - TELEGRAM_CHATID=${TELEGRAM_CHATID:?error}
    volumes:
      - ./data:/data

networks:
  hydro:
    driver: bridge
